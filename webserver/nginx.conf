events{
    worker_connections 4096;
}

http{

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    client_max_body_size 100M;

    include /etc/nginx/conf.d/*.conf;

}